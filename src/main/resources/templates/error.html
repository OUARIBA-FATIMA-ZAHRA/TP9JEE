<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur - Spring Security Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .error-container {
            background: white;
            border-radius: 10px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            color: #dc3545;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .error-code {
            font-size: 1.5rem;
            color: #6c757d;
            margin-bottom: 1rem;
            font-weight: bold;
        }

        .error-message {
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #5a6268;
            transform: translateY(-2px);
        }

        .details {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            font-size: 0.875rem;
            color: #999;
        }

        @media (max-width: 768px) {
            .error-container {
                padding: 2rem;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-icon"></div>
    <h1>Une erreur est survenue</h1>
    <div class="error-code" th:text="${status} ?: 'Erreur'">Erreur</div>
    <div class="error-message" th:text="${error} ?: 'Une erreur inattendue s\'est produite.'">
        Une erreur inattendue s'est produite.
    </div>
    <div class="btn-group">
        <a href="/home" class="btn btn-primary"> Retour à l'accueil</a>
        <a href="javascript:history.back()" class="btn btn-secondary"> Page précédente</a>
    </div>
    <div class="details" th:if="${timestamp}">
        <p> <span th:text="${timestamp}"></span></p>
        <p th:if="${path}"> <span th:text="${path}"></span></p>
    </div>
</div>
</body>
</html>
